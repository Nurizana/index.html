<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAA ENSO Summary Archive</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; color: #0f172a; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #1e40af; margin: 0; }
        
        /* Tab Styling */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { background: #e2e8f0; color: #334155; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
        .tab-btn.active { background: #1e40af; color: white; }
        .tab-btn:hover:not(.active) { background: #cbd5e1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Print button styling */
        .print-btn { background: #1e40af; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        .print-btn:hover { background: #1e3a8a; }

        .data-row { margin-bottom: 18px; font-size: 15px; line-height: 1.6; }
        .data-label { font-weight: bold; color: #334155; display: block; margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}
        .highlight { background: #fef3c7; color: #b45309; padding: 4px 8px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .gif-container { margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        img { max-width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; margin-top: 10px; }
        #loading { text-align: center; color: #64748b; font-style: italic; font-size: 16px; padding: 40px; }
        #error-log { color: #ef4444; font-size: 13px; margin-top: 10px; font-style: normal; display: block; }

        /* Archive File List Styling */
        .archive-list { list-style: none; padding: 0; }
        .archive-list li { background: #f1f5f9; padding: 12px 16px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #1e40af; display: flex; align-items: center;}
        .archive-list a { text-decoration: none; color: #1e40af; font-weight: bold; display: flex; align-items: center; gap: 10px; width: 100%; }
        .archive-list a:hover { text-decoration: underline; }
        .file-icon { font-size: 20px; }

        @media print {
            .print-btn, .tab-container { display: none; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: none; padding: 0; max-width: 100%; }
            .gif-container { break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-container">
            <h2>NOAA ENSO Summary</h2>
            <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab(event, 'latest')">Latest Forecast</button>
            <button class="tab-btn" onclick="switchTab(event, 'archive')">Archive</button>
        </div>
        
        <div id="latest" class="tab-content active">
            <div id="loading">📡 Reading forecast from Climate Prediction Center...<div id="error-log"></div></div>
            
            <div id="content" style="display: none;">
                <div class="data-row"><span class="data-label">1. Issued By</span><span id="val-issued"></span></div>
                <div class="data-row"><span class="data-label">2. ENSO Alert System Status</span><span id="val-status" class="highlight"></span></div>
                <div class="data-row"><span class="data-label">3. Synopsis</span><span id="val-synopsis"></span></div>
                <div class="data-row"><span class="data-label">4. Latest Data</span><span id="val-nino"></span></div>
                <div class="gif-container"><span class="data-label">5. SST Anomalies (Figure 01)</span><img id="val-img-01" src="" alt="ENSO Figure 01"></div>
                <div class="gif-container"><span class="data-label">6. Forecast Model (Figure 06)</span><img id="val-img-06" src="" alt="ENSO Figure 06"></div>
            </div>
        </div>

        <div id="archive" class="tab-content">
            <ul class="archive-list">
                <li>
                    <a href="/ENSO-Summary-Archive/NOAA%20ENSO%20summary_2026_April_09.pdf" target="_blank" title="View PDF Archive">
                        <span class="file-icon">📄</span> NOAA ENSO summary_2026_April_09.pdf
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // Function to handle tab switching
        function switchTab(event, tabId) {
            // Hide all contents and remove active class from buttons
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show targeted content and highlight corresponding button
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Original Scraper logic
        async function scrapeNOAA() {
            const targetUrl = 'https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml';
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`Network response was not OK`);
                
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                let cleanText = doc.body.textContent || doc.body.innerText;
                cleanText = cleanText.replace(/\s+/g, ' '); 
                
                const issuerMatch = cleanText.match(/issued by\s+(CLIMATE PREDICTION CENTER.*?NWS\s+\d{1,2}\s+[a-zA-Z]+\s+\d{4})/i);
                const issuedBy = issuerMatch ? issuerMatch[1].trim() : "CLIMATE PREDICTION CENTER/NCEP/NWS";
                
                const statusMatch = cleanText.match(/ENSO Alert System Status:\s*(.*?)\s*Synopsis:/i);
                const status = statusMatch ? statusMatch[1].trim() : "Data unavailable";
                
                const synopsisMatch = cleanText.match(/Synopsis:\s*(.*?)(?:During the last month|In summary|The latest weekly)/i);
                const synopsis = synopsisMatch ? synopsisMatch[1].trim() : "Data unavailable";
                
                const ninoMatch = cleanText.match(/(The latest weekly Niño-3\.4 index value was\s*[+-]?\d+\.\d+[^C]*C)/i);
                const nino34 = ninoMatch ? ninoMatch[1].trim() : "Niño-3.4 value not found";
                
                const figure01Url = "https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/figure01.gif";
                const figure06Url = "https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/figure06.gif";

                document.getElementById('val-issued').innerText = issuedBy;
                document.getElementById('val-status').innerText = status;
                document.getElementById('val-synopsis').innerText = synopsis;
                document.getElementById('val-nino').innerText = nino34;
                document.getElementById('val-img-01').src = figure01Url;
                document.getElementById('val-img-06').src = figure06Url;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                document.getElementById('loading').innerHTML = `⚠️ Error scraping data. <span id="error-log">${err.message}</span>`;
            }
        }
        scrapeNOAA();
    </script>
</body>
</html>
